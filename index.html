const round10 = (n) => Math.max(0, Math.round(n / 10) * 10);
const fmt = (n) => Math.round(n).toLocaleString("en-US");

const SPACE_RATES = {
  cosm:   { 30: 55, 60: 50, 90: 48 },
  nails:  { 30: 39, 60: 36, 90: 34 },
  spa:    { 30: 51, 60: 47, 90: 44 },
  hair:   { 30: 35, 60: 32, 90: 31 },
  makeup: { 30: 31, 60: 29, 90: 27 },
  other:  { 30: 39, 60: 36, 90: 34 },
};

function spaceCost(spec, weeklyHours) {
  const rates = SPACE_RATES[spec] || SPACE_RATES.other;
  const monthly = weeklyHours * 4.3;
  const tier = monthly <= 35 ? 30 : monthly <= 65 ? 60 : 90;
  return { cost: monthly * rates[tier], tier, rate: rates[tier] };
}

function computeResult(role, a) {
  let space = 0, crm = 0, market = 0;
  const details = {};
  const info = {};
  if (role === "master") {
    const paysRent = a.workspace === "own" || a.workspace === "salon";
    const cityOk = a.city !== "other";
    const minRate = (SPACE_RATES[a.spec] || SPACE_RATES.other)[90];
    if (paysRent && a.rent > 0 && cityOk) {
      const { cost, tier } = spaceCost(a.spec, a.hours);
      space = round10(a.rent - cost);
      if (space > 0) {
        details.space = `Ваши ~${Math.round(a.hours * 4.3)} ч/мес по абонементу ${tier} ч — ₪${fmt(cost)} вместо ₪${fmt(a.rent)} аренды`;
      } else {
        info.space = `При вашей загрузке аренда окупается. А для гибких часов или второго города — кабинет от ₪${minRate}/ч без обязательств`;
      }
    } else if (!cityOk) {
      info.space = `Наши коворкинги — в Петах-Тикве и Ашдоде. Будете рядом — кабинет по часам от ₪${minRate}/ч, без фиксированной аренды`;
    } else {
      info.space = `Приём дома — потолок по чеку. Профессиональный кабинет от ₪${minRate}/ч поднимает статус и цену услуги — без фиксированной аренды`;
    }
    crm = round10(a.noshow * a.check * 0.4 + (a.base === "crm" ? 0 : 400) - CRM_MONTHLY);
    if (a.demand === "more" || a.demand === "start") {
      market = round10(3 * a.check);
      details.market = `+2–4 новых клиента в месяц ≈ ₪${fmt(round10(2 * a.check))}–${fmt(round10(4 * a.check))}`;
    }
  } else if (role === "owner") {
    crm = round10(a.noshow * a.check * 0.35 + (a.admin === "manual" ? 800 : a.admin === "partial" ? 400 : 0) - CRM_MONTHLY);
    market = round10(3 * a.check);
    details.market = `+2–4 новых клиента в месяц ≈ ₪${fmt(round10(2 * a.check))}–${fmt(round10(4 * a.check))}`;
    info.space = "Нужен мастер на подмену или расширение без стройки? Кабинеты по часам в Петах-Тикве и Ашдоде";
  } else {
    market = round10(a.freq * a.spend * 0.12 + a.freq * 30);
    details.market = "Сравнение цен, акции и запись без переписок";
  }
  const parts = [
    { key: "space", val: space }, { key: "crm", val: crm }, { key: "market", val: market },
  ].filter((p) => p.val > 0);
  parts.sort((x, y) => y.val - x.val);
  const total = parts.reduce((s, p) => s + p.val, 0);
  const primary = parts[0] ? parts[0].key : "market";
  return { total: Math.max(total, 60), primary, parts: parts.length ? parts : [{ key: "market", val: 60 }], details, info };
}

function CountUp({ value, prefix = "", dur = 1400, style }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      setN(Math.round(value * (1 - Math.pow(1 - p, 3))));
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value, dur]);
  return <span style={style}>{prefix}₪{n.toLocaleString("en-US")}</span>;
}

            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="eyebrow" style={{ marginTop: 28 }}>Вопрос {step + 1} из {questions.length}</div>
              <h2 style={{ fontSize: 20, fontWeight: 700, letterSpacing: "-0.01em", marginTop: 8, lineHeight: 1.35 }}>
                {questions[step].q}
              </h2>
              {questions[step].type === "input" ? (
                <React.Fragment>
                  <input className="input" type="text" inputMode="numeric"
                    placeholder={questions[step].placeholder || ""} value={numInput}
                    onChange={(e) => setNumInput(e.target.value.replace(/[^0-9]/g, "").slice(0, 6))} />
                  <button className="btnMain"
                    onClick={() => { pick(questions[step].id, parseInt(numInput || "0", 10)); setNumInput(""); }}>
                    Далее
                  </button>
                  <button className="btnGhost" style={{ border: "none", display: "block", margin: "8px auto 0" }}
                    onClick={() => { pick(questions[step].id, 0); setNumInput(""); }}>
                    Не плачу аренду
                  </button>
                </React.Fragment>
              ) : (
                questions[step].opts.map((o) => (
                  <button key={o.t} className="btnOpt" onClick={() => pick(questions[step].id, o.v)}>{o.t}</button>
                ))
              )}
            </React.Fragment>
          )}
        </div>
      )}

      {mode === "result" && result && (
        <div className="wrap" style={{ marginTop: 28, textAlign: "center" }}>
          <Logo size={36} />
          <div className="eyebrow" style={{ marginTop: 16 }}>{nick ? `${nick} · ваш результат` : "Ваш результат"}</div>
          <p style={{ color: "#62626E", marginTop: 16, marginBottom: 2, fontSize: 15 }}>
            {branchKey === "client" ? "Бьюти-экосистема сэкономит вам примерно" : "Бьюти-экосистема дополнительно принесёт вам"}
          </p>
          <CountUp key={period} value={result.total * (period === "year" ? 12 : 1)} prefix="~+"
            style={{ fontSize: 54, fontWeight: 800, letterSpacing: "-0.03em", color: "#17171C", display: "block" }} />
          <div style={{ display: "inline-flex", background: "#F5F5F8", borderRadius: 10, padding: 3, marginTop: 10 }}>
            {[["month", "в месяц"], ["year", "в год"]].map(([k, label]) => (
              <button key={k} onClick={() => setPeriod(k)}
                style={{ border: "none", cursor: "pointer", borderRadius: 8, padding: "7px 16px",
                  fontFamily: "'Inter', sans-serif", fontSize: 13.5, fontWeight: 600,
                  background: period === k ? "#17171C" : "transparent", color: period === k ? "#FFFFFF" : "#62626E" }}>
                {label}
              </button>
            ))}
          </div>

          <div style={{ textAlign: "left", marginTop: 22 }}>
            {result.parts.map((p) => {
              const pr = PRODUCTS[p.key];
              return (
                <div key={p.key} className="card">
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: pr.dark }}>{pr.name}</span>
                    <span style={{ fontWeight: 700, fontSize: 17 }}>+₪{fmt(p.val * (period === "year" ? 12 : 1))}</span>
                  </div>
                  <div style={{ color: "#62626E", fontSize: 13.5, marginTop: 5 }}>{pr.tag}</div>
                  {result.details && result.details[p.key] && (
                    <div style={{ color: "#17171C", fontSize: 13, fontWeight: 500, marginTop: 10, background: "#F5F5F8", borderRadius: 8, padding: "8px 10px" }}>
                      {result.details[p.key]}
                    </div>
                  )}
                </div>
              );
            })}
            {result.info && result.info.space && (
              <div className="card" style={{ borderStyle: "dashed" }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: PRODUCTS.space.dark }}>{PRODUCTS.space.name}</span>
                <div style={{ color: "#62626E", fontSize: 13.5, marginTop: 8, lineHeight: 1.5 }}>{result.info.space}</div>
              </div>
            )}
          </div>

          <a href={waLink(PRODUCTS[result.primary].name)} target="_blank" rel="noreferrer">
            <button className="btnMain" style={{ marginTop: 20 }}>Начать экономить</button>
          </a>

          <p style={{ fontSize: 11.5, color: "#9A9AA6", marginTop: 18, lineHeight: 1.5 }}>
            Оценка на основе ваших ответов, прайса Beauty Space (Ашдод, Петах-Тиква) и средних показателей рынка.
            {saveState === "err" && " Не удалось отправить результат в общую статистику."}
          </p>
          <button className="btnGhost" onClick={restart}>Пройти ещё раз</button>
        </div>
      )}

      {mode === "pin" && (
        <div className="wrap" style={{ marginTop: 60, textAlign: "center" }}>
          <Logo size={36} />
          <div className="eyebrow" style={{ marginTop: 16 }}>Экран ведущего</div>
          <input className="input" type="password" placeholder="PIN" value={pin}
            onChange={(e) => setPin(e.target.value)} style={{ textAlign: "center", letterSpacing: ".3em" }} />
          <button className="btnMain" onClick={() => { if (pin === DASH_PIN) setMode("dash"); }}>Войти</button>
          <button className="btnGhost" style={{ border: "none" }} onClick={() => setMode("home")}>← Назад</button>
        </div>
      )}

      {mode === "dash" && (
        <div className="wrapWide" style={{ marginTop: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Logo size={28} />
              <div className="eyebrow">Мастер будущего · Живая статистика</div>
            </div>
            <div style={{ fontSize: 12, color: "#9A9AA6" }}>
              {db ? "обновляется в реальном времени" : "Firebase не настроен — статистика недоступна"}
            </div>
          </div>

          <div style={{ textAlign: "center", margin: "36px 0 8px" }}>
            <div style={{ color: "#62626E", fontSize: "clamp(15px, 2vw, 22px)" }}>
              Этот зал теряет каждый месяц — и может вернуть:
            </div>
            <CountUp key={totalSum} value={totalSum} dur={900}
              style={{ fontSize: "clamp(56px, 9vw, 112px)", fontWeight: 800, letterSpacing: "-0.03em", color: "#17171C" }} />
            <div style={{ color: "#62626E", fontSize: "clamp(13px, 1.6vw, 18px)", marginTop: 4 }}>
              {resps.length} участников · в среднем ₪{resps.length ? fmt(totalSum / resps.length) : 0} на человека
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 12, marginTop: 24 }}>
            <div className="card">
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: PRODUCTS.market.dark }}>Лидеры экономии</div>
              {leaders.length === 0 && <div style={{ color: "#9A9AA6", fontSize: 14, marginTop: 12 }}>Ждём первых участников…</div>}
              {leaders.map((r, i) => (
                <div key={(r.ts || i) + (r.n || "")} style={{ display: "flex", justifyContent: "space-between", marginTop: 12, fontSize: 15.5 }}>
                  <span><span style={{ color: "#9A9AA6", fontWeight: 600, marginRight: 8 }}>{i + 1}</span>{r.n}</span>
                  <span style={{ fontWeight: 700 }}>₪{fmt(r.total || 0)}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "#17171C" }}>Кто в зале</div>
              {Object.entries(ROLES).map(([k, label]) => {
                const c = byRole[k] || 0;
                const pct = resps.length ? (c / resps.length) * 100 : 0;
                return (
                  <div key={k} style={{ marginTop: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}>
                      <span style={{ color: "#62626E" }}>{label}</span><span style={{ fontWeight: 600 }}>{c}</span>
                    </div>
                    <div className="bar" style={{ marginTop: 6, height: 5 }}>
                      <div className="barFill" style={{ width: `${pct}%` }} />
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="card">
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: PRODUCTS.crm.dark }}>Главное решение для зала</div>
              {Object.entries(PRODUCTS).map(([k, pr]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", marginTop: 12, fontSize: 15 }}>
                  <span style={{ color: pr.dark, fontWeight: 600 }}>{pr.name}</span>
                  <span style={{ fontWeight: 700 }}>{byProduct[k] || 0}</span>
                </div>
              ))}
            </div>
            <div className="card">
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: PRODUCTS.space.dark }}>Где хотят работать</div>
              {Object.entries(CITY_LABELS).map(([k, label]) => (
                <div key={k} style={{ display: "flex", justifyContent: "space-between", marginTop: 12, fontSize: 15 }}>
                  <span style={{ color: "#62626E" }}>{label}</span>
                  <span style={{ fontWeight: 700 }}>{byCity[k] || 0}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", gap: 10, marginTop: 20, justifyContent: "center" }}>
            <button className="btnGhost" onClick={resetAll} style={{ color: PRODUCTS.market.dark }}>Сбросить данные</button>
            <button className="btnGhost" onClick={() => setMode("home")}>← К квизу</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
